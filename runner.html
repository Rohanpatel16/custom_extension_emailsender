<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Email Sender - Running...</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            text-align: center;
        }

        .progress {
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.2em;
        }

        .log {
            margin-top: 15px;
            font-size: 12px;
            color: #666;
            height: 300px;
            overflow-y: auto;
            text-align: left;
            border: 1px solid #ccc;
            padding: 10px;
            background: #f9f9f9;
        }

        .close-btn {
            margin-top: 20px;
            padding: 10px 20px;
            cursor: pointer;
            background-color: #f44336;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
        }

        .close-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .status-bar {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 4px;
            color: white;
            display: none;
        }

        .success {
            background-color: #4CAF50;
        }

        .error {
            background-color: #f44336;
        }
    </style>
</head>

<body>
    <h2>Sending Emails...</h2>
    <div id="statusBar" class="status-bar"></div>
    <div class="progress" id="progress">Initializing...</div>
    <div class="log" id="log"></div>
    <button id="closeBtn" class="close-btn" disabled>Close Window</button>
    <script src="runner.js"></script>
</body>

</html>
